name: Deploy

on:
  push:
    branches:
      - deploy

jobs:
  build-and-docker:
    runs-on: ubuntu-latest
    steps:
      # 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v3
      # JDK 설치
      - name: Set up JDK 17 # build.gradle 버전 확인
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'temurin'
      # Gradle Wrapper 검증
      - name: Set up Gradle
        uses: gradle/wrapper-validation-action@v1
      # 설정 파일 생성
      - name: Create Config Files
        run: |
          mkdir -p deploy-secrets/key
          echo "spring.application.name=${{ secrets.SPRING_APPLICATION_NAME }}" > deploy-secrets/application.properties
          echo "spring.datasource.url=${{ secrets.SPRING_DATASOURCE_URL }}" >> deploy-secrets/application.properties
          echo "spring.datasource.username=${{ secrets.SPRING_DATASOURCE_USERNAME }}" >> deploy-secrets/application.properties
          echo "spring.datasource.password=${{ secrets.SPRING_DATASOURCE_PASSWORD }}" >> deploy-secrets/application.properties
          echo "spring.datasource.driver-class-name=${{ secrets.SPRING_DATASOURCE_DRIVER_CLASS_NAME }}" >> deploy-secrets/application.properties
          echo "spring.jpa.hibernate.ddl-auto=${{ secrets.SPRING_JPA_HIBERNATE_DDL_AUTO }}" >> deploy-secrets/application.properties
          echo "jwt.secret.key=${{ secrets.JWT_SECRETKEY }}" >> deploy-secrets/application.properties
          echo "jwt.access.expiration=${{ secrets.JWT_ACCESS_EXPIRATION }}" >> deploy-secrets/application.properties
          echo "jwt.refresh.expiration=${{ secrets.JWT_REFRESH_EXPIRATION }}" >> deploy-secrets/application.properties
          echo "jwt.access.header=${{ secrets.JWT_ACCESS_HEADER }}" >> deploy-secrets/application.properties
          echo "jwt.refresh.header=${{ secrets.JWT_REFRESH_HEADER }}" >> deploy-secrets/application.properties
          echo "google.web.client-id = ${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> deploy-secrets/application.properties
          echo "google.app.client-id = ${{ secrets.GOOGLE_APP_CLIENT_ID }}" >> deploy-secrets/application.properties
          echo "spring.security.oauth2.client.registration.google.client-secret=${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET }}" >> deploy-secrets/application.properties
          echo "spring.security.oauth2.client.registration.google.scope=${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_SCOPE }}" >> deploy-secrets/application.properties
          echo "spring.security.oauth2.client.registration.google.redirect-uri=${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI }}" >> deploy-secrets/application.properties
          echo "spring.security.oauth2.client.registration.google.authorization-grant-type=${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_AUTHORIZATION_GRANT_TYPE }}" >> deploy-secrets/application.properties
          echo "spring.security.oauth2.client.registration.google.client-name=${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_NAME }}" >> deploy-secrets/application.properties
          echo "spring.security.oauth2.client.provider.google.authorization-uri=${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_GOOGLE_AUTHORIZATION_URI }}" >> deploy-secrets/application.properties
          echo "spring.security.oauth2.client.provider.google.token-uri=${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_GOOGLE_TOKEN_URI }}" >> deploy-secrets/application.properties
          echo "spring.security.oauth2.client.provider.google.user-info-uri=${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_GOOGLE_USER_INFO_URI }}" >> deploy-secrets/application.properties
          echo "spring.security.oauth2.client.provider.google.user-name-attribute=${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_GOOGLE_USER_NAME_ATTRIBUTE }}" >> deploy-secrets/application.properties
          echo "spring.security.oauth2.client.registration.kakao.client-id=${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_ID }}" >> deploy-secrets/application.properties
          echo "spring.security.oauth2.client.registration.kakao.scope=${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_SCOPE }}" >> deploy-secrets/application.properties
          echo "spring.security.oauth2.client.registration.kakao.redirect-uri=${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_REDIRECT_URI }}" >> deploy-secrets/application.properties
          echo "spring.security.oauth2.client.registration.kakao.authorization-grant-type=${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_AUTHORIZATION_GRANT_TYPE }}" >> deploy-secrets/application.properties
          echo "spring.security.oauth2.client.registration.kakao.client-name=${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_NAME }}" >> deploy-secrets/application.properties
          echo "spring.security.oauth2.client.provider.kakao.authorization-uri=${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KAKAO_AUTHORIZATION_URI }}" >> deploy-secrets/application.properties
          echo "spring.security.oauth2.client.provider.kakao.token-uri=${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KAKAO_TOKEN_URI }}" >> deploy-secrets/application.properties
          echo "spring.security.oauth2.client.provider.kakao.user-info-uri=${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KAKAO_USER_INFO_URI }}" >> deploy-secrets/application.properties
          echo "spring.security.oauth2.client.provider.kakao.user-name-attribute=${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KAKAO_USER_NAME_ATTRIBUTE }}" >> deploy-secrets/application.properties
          echo "apple.client.id=${{ secrets.APPLE_CLIENT_ID }}" >> deploy-secrets/application.properties
          echo "apple.client.secret=/etc/ontime/key/AuthKey_743M7R5W3W.p8" >> deploy-secrets/application.properties
          echo "apple.login.key=${{ secrets.APPLE_LOGIN_KEY }}" >> deploy-secrets/application.properties
          echo "apple.team.id=${{ secrets.APPLE_TEAM_ID }}" >> deploy-secrets/application.properties
          echo "firebase.credentials.path=/etc/ontime/firebase-adminsdk.json" >> deploy-secrets/application.properties
          echo "spring.flyway.enabled=true" >> deploy-secrets/application.properties
          echo "spring.flyway.url=${{ secrets.SPRING_FLYWAY_URL }}" >> deploy-secrets/application.properties
          echo "spring.flyway.user=${{ secrets.SPRING_FLYWAY_USER }}" >> deploy-secrets/application.properties
          echo "spring.flyway.password=${{ secrets.SPRING_FLYWAY_PASSWORD }}" >> deploy-secrets/application.properties
          echo "spring.flyway.baseline-on-migrate=true" >> deploy-secrets/application.properties
          echo "management.endpoints.web.exposure.include=health" >> deploy-secrets/application.properties
          echo "management.endpoint.health.show-details=always" >> deploy-secrets/application.properties
          echo "server.forward-headers-strategy=framework" >> deploy-secrets/application.properties
          echo "${{ secrets.ONTIME_PUSH_FIREBASE_ADMINSDK }}" > deploy-secrets/firebase-adminsdk.json
          echo "${{ secrets.AUTHKEY_743M7R5W3W }}" > deploy-secrets/key/AuthKey_743M7R5W3W.p8
          chmod 600 deploy-secrets/application.properties deploy-secrets/firebase-adminsdk.json deploy-secrets/key/AuthKey_743M7R5W3W.p8
      # Gradle 빌드
      - name: Build with Gradle
        run: |
          cd ontime-back  
          ./gradlew build -x test
      # 파일 위치 변경
      - name: Move file
        run: |
          mv ontime-back/build/libs/ontime-back-0.0.1-SNAPSHOT.jar ./project.jar
          mv ontime-back/docker-compose.yml ./docker-compose.yml
          mv ontime-back/Dockerfile ./Dockerfile
      # EC2 서버에 업로드
      - name: Upload files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
           host: ${{ secrets.EC2_HOST }}
           username: ${{ secrets.EC2_USER }}
           key: ${{ secrets.EC2_SSH_KEY }}
           source: "./project.jar, ./docker-compose.yml, ./Dockerfile, ./deploy-secrets/application.properties, ./deploy-secrets/firebase-adminsdk.json, ./deploy-secrets/key/AuthKey_743M7R5W3W.p8"
           target: "/home/ubuntu/OnTime-back"
  create-config-files:
    needs: build-and-docker
    runs-on: ubuntu-latest
    steps:
    # EC2 서버에 접근 + 설정 파일 생성
    - name: SSH to EC2 & Create Config Files
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo mkdir -p /etc/ontime/key
          sudo mv /home/ubuntu/OnTime-back/deploy-secrets/application.properties /etc/ontime/application.properties
          sudo mv /home/ubuntu/OnTime-back/deploy-secrets/firebase-adminsdk.json /etc/ontime/firebase-adminsdk.json
          sudo mv /home/ubuntu/OnTime-back/deploy-secrets/key/AuthKey_743M7R5W3W.p8 /etc/ontime/key/AuthKey_743M7R5W3W.p8
          sudo chown -R ubuntu:ubuntu /etc/ontime
          sudo chmod 700 /etc/ontime /etc/ontime/key
          sudo chmod 600 /etc/ontime/application.properties /etc/ontime/firebase-adminsdk.json /etc/ontime/key/AuthKey_743M7R5W3W.p8
          rm -rf /home/ubuntu/OnTime-back/deploy-secrets

  deploy-to-ec2:
    needs: create-config-files
    runs-on: ubuntu-latest
    steps:
    # EC2 서버에 접근 + docker container 배포
    - name: SSH to EC2 & Deploy Docker Containers
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 기존 컨테이너 종료 및 삭제
          CONTAINER_ID=$(sudo docker ps -aq --filter "name=ontime-container")
          if [ ! -z "$CONTAINER_ID" ]; then
            sudo docker stop $CONTAINER_ID
            sudo docker rm $CONTAINER_ID
          fi
          
          # 기존 컨테이너 및 볼륨 정리
          sudo docker-compose down
          sudo docker container prune -f
          sudo docker image prune -a -f
          sudo docker volume prune -f
          sudo docker network prune -f
          
          # Docker Compose 실행
          cd /home/ubuntu/OnTime-back
          docker-compose up --build -d
      

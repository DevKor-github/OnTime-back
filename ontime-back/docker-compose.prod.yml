services:
  mysql:
    image: mysql:8.0
    container_name: ontime-mysql
    restart: unless-stopped
    env_file:
      - /etc/ontime/mysql.env
    environment:
      MYSQL_DATABASE: ontime_db
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ontime-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ontime-back:prod
    container_name: ontime-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: file:/etc/ontime/application.properties
      FIREBASE_CREDENTIALS_PATH: /etc/ontime/firebase-adminsdk.json
    volumes:
      - /etc/ontime:/etc/ontime:ro

volumes:
  ontime-mysql-data:

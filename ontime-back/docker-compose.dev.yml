services:
  backend:
    container_name: "${BACKEND_CONTAINER_NAME:-ontime-dev-container}"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: ontime-dev-mysql
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE:-ontime_dev}"
      MYSQL_USER: "${MYSQL_USER:-ontime_dev}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-ontime_dev_password}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-ontime_dev_root_password}"
      TZ: Asia/Seoul
    volumes:
      - ontime-dev-mysql-data:/var/lib/mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root --password=$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ontime-dev-mysql-data:

spring.datasource.url=jdbc:h2:mem:ontime_test;MODE=MySQL;NON_KEYWORDS=USER;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=false

jwt.secret.key=test_secret_key_for_ontime_back_application_tests_1234567890
jwt.access.expiration=3600000
jwt.refresh.expiration=1209600000
jwt.access.header=Authorization
jwt.refresh.header=Authorization-refresh

google.web.client-id=test-google-web-client-id
google.app.client-id=test-google-app-client-id

apple.client.id=test-apple-client-id
apple.team.id=test-apple-team-id
apple.login.key=test-apple-key-id
apple.client.secret=
apple.private-key.base64=

firebase.credentials.base64=
feature.apple-login.enabled=false
analytics.preference.default-enabled=${ANALYTICS_PREFERENCE_DEFAULT_ENABLED:false}
